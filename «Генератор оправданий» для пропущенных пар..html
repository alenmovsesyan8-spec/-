<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор оправданий для студентов</title>
    <style>
        /* ВАШ КРАСИВЫЙ СТИЛЬ ВОЗВРАЩАЕТСЯ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            min-height: 100vh;
            color: white;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            color: white;
        }

        .subtitle {
            font-size: 1.1em;
            opacity: 0.9;
            margin-bottom: 20px;
        }

        .counter {
            background: rgba(0, 0, 0, 0.2);
            padding: 10px 20px;
            border-radius: 50px;
            display: inline-block;
            font-size: 0.9em;
            margin-bottom: 20px;
        }

        .excuse-display {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 15px;
            padding: 25px;
            margin: 20px 0;
            min-height: 180px;
            font-size: 1.4em;
            line-height: 1.6;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            border-left: 5px solid #FFD700;
        }

        .categories {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .cat-btn {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .cat-btn:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        .cat-btn.active {
            background: rgba(255, 215, 0, 0.3);
            border-color: #FFD700;
        }

        .btn-generate {
            background: linear-gradient(to right, #FF416C, #FF4B2B);
            color: white;
            border: none;
            padding: 18px;
            font-size: 1.2em;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            margin: 15px 0;
            width: 100%;
            box-shadow: 0 5px 15px rgba(255, 65, 108, 0.4);
        }

        .btn-generate:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 65, 108, 0.6);
        }

        .btn-copy {
            background: linear-gradient(to right, #00b09b, #96c93d);
            color: white;
            border: none;
            padding: 18px;
            font-size: 1.2em;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            margin: 10px 0;
            width: 100%;
            box-shadow: 0 5px 15px rgba(0, 176, 155, 0.4);
        }

        .btn-copy:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 176, 155, 0.6);
        }

        .btn-history {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 15px;
            border-radius: 50px;
            cursor: pointer;
            margin: 15px 0;
            width: 100%;
            font-size: 1em;
        }

        .history-section {
            margin-top: 20px;
            max-height: 250px;
            overflow-y: auto;
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            display: none;
        }

        .history-item {
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 0.95em;
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .history-time {
            font-size: 0.8em;
            color: rgba(255, 255, 255, 0.7);
            margin-right: 10px;
        }

        .clear-history {
            background: rgba(220, 53, 69, 0.7);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            margin-top: 10px;
            font-size: 0.9em;
        }

        .clear-history:hover {
            background: rgba(220, 53, 69, 0.9);
        }

        footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 0.9em;
            opacity: 0.8;
        }

        @media (max-width: 600px) {
            .container {
                padding: 15px;
            }

            h1 {
                font-size: 1.8em;
            }

            .excuse-display {
                font-size: 1.1em;
                padding: 15px;
                min-height: 140px;
            }

            .cat-btn {
                padding: 8px 15px;
                font-size: 0.9em;
            }

            .btn-generate, .btn-copy {
                padding: 15px;
                font-size: 1.1em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 Генератор Оправданий</h1>
            <p class="subtitle">Для творческих студентов</p>
            <div class="counter" id="counter">Использовано: 0 раз</div>
        </header>

        <div class="excuse-display" id="excuseDisplay">
            Нажмите кнопку для генерации блестящего оправдания!
        </div>

        <div class="categories">
            <button class="cat-btn active" data-cat="all">Все 🎲</button>
            <button class="cat-btn" data-cat="tech">Тех 💻</button>
            <button class="cat-btn" data-cat="nature">Природа 🌿</button>
            <button class="cat-btn" data-cat="sci">Наука 🔬</button>
            <button class="cat-btn" data-cat="absurd">Абсурд 🤪</button>
        </div>

        <button class="btn-generate" id="generateBtn">🎲 Сгенерировать новое оправдание</button>
        <button class="btn-copy" id="copyBtn">📋 Скопировать оправдание</button>
        <button class="btn-history" id="historyBtn">📜 Показать историю</button>

        <div class="history-section" id="historySection">
            <div id="historyList">
                <!-- История будет здесь -->
            </div>
            <button class="clear-history" id="clearHistoryBtn">🗑️ Очистить историю</button>
        </div>

        <footer>
            <p>P.S. Преподаватель тоже был студентом... Возможно, он поверит 😉</p>
        </footer>
    </div>

    <script>
        // БАЗА ОПРАВДАНИЙ
        const excusesDB = {
            tech: [
                "Мой будильник синхронизировался с марсианским ровером и прозвенел на 2 часа позже.",
                "Умные часы решили, что у меня стресс, и заблокировали все уведомления о парах.",
                "В моём общежитии отключили интернет, и я не смог найти расписание в облаке.",
                "ИИ в моём телефоне спрогнозировал, что пару отменят, и не разбудил меня.",
                "Я обновлял систему на ноутбуке, и она потребовала перезагрузки в самый неподходящий момент.",
                "Мой телефон получил автономное обновление и решил отдохнуть 3 часа."
            ],
            nature: [
                "По пути в универ я спас котёнка, застрявшего в дереве. Это заняло 2 часа.",
                "Стая голубей устроила координационную атаку на мой конспект. Пришлось восстанавливать.",
                "На аллее перед корпусом расцвёл уникальный вид орхидеи. Я изучал его для ботаники.",
                "Проснулся пораньше, чтобы выучить билеты, но меня усыпил запах сирени под окном.",
                "Улицу перекрыли из-за миграции ежей. Пришлось ждать, пока они все перейдут.",
                "Нашёл редкий вид гриба и изучал его для кафедры биологии."
            ],
            sci: [
                "Проводил эксперимент по теории относительности: время в транспорте действительно замедлилось.",
                "Обнаружил аномалию в расчётах по квантовой физике и не мог оторваться, пока не решил.",
                "Мозг во сне обрабатывал информацию с прошлой пары и требовал дополнительного времени.",
                "Исследовал зависимость скорости пробуждения от фазы луны. Сегодня была неблагоприятная фаза.",
                "Пытался достичь состояния гиперфокуса с помощью бинауральных ритмов, но перестарался.",
                "Открыл новый закон физики, но он действовал только в моей комнате до 10 утра."
            ],
            absurd: [
                "Встретил своего двойника из параллельной вселенной и выяснял, кто из нас настоящий.",
                "Готовил пельмени, но один сбежал. Пришлось организовать поисковую операцию на кухне.",
                "Мой хомяк начал говорить и потребовал срочно обсудить философию стоицизма.",
                "Призрак Ньютона явился мне во сне и настаивал на пересмотре второго закона.",
                "Нашёл в шкафу портал в Нарнию. Там время течёт иначе, я и не заметил.",
                "Инопланетяне похитили мои конспекты и вернули только после обеда."
            ]
        };

        // ПЕРЕМЕННЫЕ
        let currentCategory = 'all';
        let currentExcuse = '';
        let usageCount = 0;
        let history = [];
        let historyVisible = false;

        // ЭЛЕМЕНТЫ
        const excuseDisplay = document.getElementById('excuseDisplay');
        const generateBtn = document.getElementById('generateBtn');
        const copyBtn = document.getElementById('copyBtn');
        const historyBtn = document.getElementById('historyBtn');
        const clearHistoryBtn = document.getElementById('clearHistoryBtn');
        const historySection = document.getElementById('historySection');
        const historyList = document.getElementById('historyList');
        const counterElement = document.getElementById('counter');
        const catButtons = document.querySelectorAll('.cat-btn');

        // ИНИЦИАЛИЗАЦИЯ
        document.addEventListener('DOMContentLoaded', () => {
            loadFromStorage();
            generateExcuse();
        });

        // ГЕНЕРАЦИЯ ОПРАВДАНИЯ
        function generateExcuse() {
            let pool;
            if (currentCategory === 'all') {
                pool = [...excusesDB.tech, ...excusesDB.nature, ...excusesDB.sci, ...excusesDB.absurd];
            } else {
                pool = excusesDB[currentCategory];
            }

            const randomIndex = Math.floor(Math.random() * pool.length);
            currentExcuse = pool[randomIndex];

            // Отображение
            excuseDisplay.textContent = currentExcuse;

            // Добавление в историю
            addToHistory(currentExcuse);

            // Обновление счетчика
            usageCount++;
            updateCounter();
            saveToStorage();
        }

        // ДОБАВЛЕНИЕ В ИСТОРИЮ
        function addToHistory(excuse) {
            const now = new Date();
            const time = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            const date = now.toLocaleDateString('ru-RU');

            const historyItem = {
                text: excuse,
                time: time,
                date: date,
                category: currentCategory
            };

            history.unshift(historyItem);
            if (history.length > 15) {
                history.pop();
            }

            updateHistoryDisplay();
        }

        // ОБНОВЛЕНИЕ ИСТОРИИ
        function updateHistoryDisplay() {
            if (history.length === 0) {
                historyList.innerHTML = '<div class="history-item">История пуста</div>';
                return;
            }

            historyList.innerHTML = '';
            history.forEach(item => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = `
                    <span class="history-time">${item.time}</span>
                    <span>${item.text}</span>
                `;
                historyList.appendChild(div);
            });
        }

        // ПОКАЗАТЬ/СКРЫТЬ ИСТОРИЮ
        function toggleHistory() {
            historyVisible = !historyVisible;
            if (historyVisible) {
                historySection.style.display = 'block';
                historyBtn.textContent = '📜 Скрыть историю';
            } else {
                historySection.style.display = 'none';
                historyBtn.textContent = '📜 Показать историю';
            }
        }

        // ОЧИСТКА ИСТОРИИ
        function clearHistory() {
            if (confirm('Очистить всю историю оправданий?')) {
                history = [];
                usageCount = 0;
                updateHistoryDisplay();
                updateCounter();
                saveToStorage();
                generateExcuse();
            }
        }

        // КОПИРОВАНИЕ
        function copyToClipboard() {
            if (!currentExcuse) return;

            navigator.clipboard.writeText(currentExcuse)
                .then(() => {
                    const original = copyBtn.innerHTML;
                    copyBtn.innerHTML = '✅ Скопировано!';
                    copyBtn.style.background = 'linear-gradient(to right, #28a745, #20c997)';

                    setTimeout(() => {
                        copyBtn.innerHTML = original;
                        copyBtn.style.background = 'linear-gradient(to right, #00b09b, #96c93d)';
                    }, 2000);
                })
                .catch(() => {
                    // Резервный метод
                    const textArea = document.createElement('textarea');
                    textArea.value = currentExcuse;
                    document.body.appendChild(textArea);
                    textArea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textArea);

                    const original = copyBtn.innerHTML;
                    copyBtn.innerHTML = '✅ Скопировано!';
                    copyBtn.style.background = 'linear-gradient(to right, #28a745, #20c997)';

                    setTimeout(() => {
                        copyBtn.innerHTML = original;
                        copyBtn.style.background = 'linear-gradient(to right, #00b09b, #96c93d)';
                    }, 2000);
                });
        }

        // ОБНОВЛЕНИЕ СЧЕТЧИКА
        function updateCounter() {
            const wordForm = getWordForm(usageCount);
            counterElement.textContent = `Использовано: ${usageCount} ${wordForm}`;
        }

        // СКЛОНЕНИЕ СЛОВ
        function getWordForm(number) {
            if (number % 10 === 1 && number % 100 !== 11) return 'раз';
            if ([2,3,4].includes(number % 10) && ![12,13,14].includes(number % 100)) return 'раза';
            return 'раз';
        }

        // СОХРАНЕНИЕ В LOCALSTORAGE
        function saveToStorage() {
            localStorage.setItem('excuseHistory', JSON.stringify(history));
            localStorage.setItem('excuseCount', usageCount);
        }

        function loadFromStorage() {
            const savedHistory = localStorage.getItem('excuseHistory');
            const savedCount = localStorage.getItem('excuseCount');

            if (savedHistory) {
                history = JSON.parse(savedHistory);
                updateHistoryDisplay();
            }

            if (savedCount) {
                usageCount = parseInt(savedCount);
                updateCounter();
            }
        }

        // СОБЫТИЯ
        generateBtn.addEventListener('click', generateExcuse);
        copyBtn.addEventListener('click', copyToClipboard);
        historyBtn.addEventListener('click', toggleHistory);
        clearHistoryBtn.addEventListener('click', clearHistory);

        // КАТЕГОРИИ
        catButtons.forEach(btn => {
            btn.addEventListener('click', function() {
                catButtons.forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentCategory = this.dataset.cat;
                generateExcuse();
            });
        });

        // ГОРЯЧИЕ КЛАВИШИ
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && !e.target.matches('button, input, textarea')) {
                e.preventDefault();
                generateExcuse();
            }
            if (e.code === 'KeyC' && (e.ctrlKey || e.metaKey)) {
                e.preventDefault();
                copyToClipboard();
            }
        });
    </script>
</body>
</html>
