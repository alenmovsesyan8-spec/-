<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор оправданий для пропушеных пар </title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            min-height: 100vh;
            color: white;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            color: white;
        }

        .subtitle {
            font-size: 1.1em;
            opacity: 0.9;
            margin-bottom: 20px;
        }

        .ai-badge {
            background: rgba(0, 0, 0, 0.3);
            padding: 5px 15px;
            border-radius: 50px;
            display: inline-block;
            font-size: 0.8em;
            margin-bottom: 15px;
        }

        .counter {
            background: rgba(0, 0, 0, 0.2);
            padding: 10px 20px;
            border-radius: 50px;
            display: inline-block;
            font-size: 0.9em;
            margin-bottom: 20px;
        }

        .excuse-display {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 15px;
            padding: 25px;
            margin: 20px 0;
            min-height: 180px;
            font-size: 1.4em;
            line-height: 1.6;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            border-left: 5px solid #FFD700;
        }

        .categories {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .cat-btn {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .cat-btn:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        .cat-btn.active {
            background: rgba(255, 215, 0, 0.3);
            border-color: #FFD700;
        }

        .btn-generate {
            background: linear-gradient(to right, #FF416C, #FF4B2B);
            color: white;
            border: none;
            padding: 18px;
            font-size: 1.2em;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            margin: 15px 0;
            width: 100%;
            box-shadow: 0 5px 15px rgba(255, 65, 108, 0.4);
        }

        .btn-generate:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 65, 108, 0.6);
        }

        .btn-generate:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-copy {
            background: linear-gradient(to right, #00b09b, #96c93d);
            color: white;
            border: none;
            padding: 18px;
            font-size: 1.2em;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            margin: 10px 0;
            width: 100%;
            box-shadow: 0 5px 15px rgba(0, 176, 155, 0.4);
        }

        .btn-copy:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 176, 155, 0.6);
        }

        .btn-history {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 15px;
            border-radius: 50px;
            cursor: pointer;
            margin: 15px 0;
            width: 100%;
            font-size: 1em;
        }

        .history-section {
            margin-top: 20px;
            max-height: 250px;
            overflow-y: auto;
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            display: none;
        }

        .history-item {
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 0.95em;
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .history-time {
            font-size: 0.8em;
            color: rgba(255, 255, 255, 0.7);
            margin-right: 10px;
        }

        .clear-history {
            background: rgba(220, 53, 69, 0.7);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            margin-top: 10px;
            font-size: 0.9em;
        }

        .clear-history:hover {
            background: rgba(220, 53, 69, 0.9);
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 0.9em;
            opacity: 0.8;
        }

        @media (max-width: 600px) {
            .container {
                padding: 15px;
            }
            h1 {
                font-size: 1.8em;
            }
            .excuse-display {
                font-size: 1.1em;
                padding: 15px;
                min-height: 140px;
            }
            .cat-btn {
                padding: 8px 15px;
                font-size: 0.9em;
            }
            .btn-generate, .btn-copy {
                padding: 15px;
                font-size: 1.1em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 Генератор Оправданий</h1>
            <div class="counter" id="counter">Использовано: 0 раз</div>
        </header>

        <div class="excuse-display" id="excuseDisplay">
            Нажмите кнопку — нейросеть придумает оправдание!
        </div>

        <div class="categories">
            <button class="cat-btn active" data-cat="random">🎲 Случайный</button>
            <button class="cat-btn" data-cat="transport">🚌 Транспорт</button>
            <button class="cat-btn" data-cat="tech">💻 Техника</button>
            <button class="cat-btn" data-cat="nature">🌿 Природа</button>
            <button class="cat-btn" data-cat="hero">🦸 Геройство</button>
        </div>

        <button class="btn-generate" id="generateBtn">✨ Сгенерировать оправдание ✨</button>
        <button class="btn-copy" id="copyBtn">📋 Скопировать оправдание</button>
        <button class="btn-history" id="historyBtn">📜 Показать историю</button>

        <div class="history-section" id="historySection">
            <div id="historyList">
          
            </div>
            <button class="clear-history" id="clearHistoryBtn">🗑 Очистить историю</button>
        </div>

  
    </div>

<script>

    const YANDEX_API_KEY = 'AQVNzFKmvqwobDFYXIJ0irkzr-a0V9Tb-YelXmvL';
    const FOLDER_ID = 'b1g11f5t6qk8rthn8c';

    const scenarioPrompts = {
        transport: 'транспортный коллапс: сломался автобус, огромная пробка, авария на дороге, метро встало, трамвай сошёл с рельсов',
        tech: 'технический сбой: не сработал будильник из-за обновления, отключили электричество, сломался телефон, умная колонка не разбудила',
        nature: 'природный форс-мажор: ливень, снегопад, ураган, затопило дороги, упавшее дерево, гололёд',
        hero: 'геройский поступок: помог пожилому человеку, спас животное, помог ребёнку найти родителей, вернул найденный кошелёк'
    };

    async function generateExcuseByAI(subject, scenarioType) {
        let scenarioText = scenarioPrompts[scenarioType];
        if (!scenarioText || scenarioType === 'random') {
            const values = Object.values(scenarioPrompts);
            scenarioText = values[Math.floor(Math.random() * values.length)];
        }

        const prompt = `Придумай короткое, смешное и правдоподобное оправдание для опоздания на ${subject}. Сценарий: ${scenarioText}. 3-5 предложений, от первого лица. В конце фраза "Обещаю, такого больше не повторится!". Только текст оправдания. На русском языке.`;

        const response = await fetch('https://llm.api.cloud.yandex.net/foundationModels/v1/completion', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Api-Key ${YANDEX_API_KEY}`
            },
            body: JSON.stringify({
                modelUri: `gpt://${FOLDER_ID}/yandexgpt/latest`,
                completionOptions: {
                    stream: false,
                    temperature: 0.9,
                    maxTokens: 350
                },
                messages: [{ role: 'user', text: prompt }]
            })
        });

        if (!response.ok) {
            const err = await response.json();
            throw new Error(err.message || 'Ошибка API');
        }

        const data = await response.json();
        let text = data.result.alternatives[0].message.text;
        return text.replace(/```/g, '').trim();
    }

    let currentCategory = 'random';
    let currentExcuse = '';
    let usageCount = 0;
    let history = [];
    let historyVisible = false;
    let isLoading = false;

    const excuseDisplay = document.getElementById('excuseDisplay');
    const generateBtn = document.getElementById('generateBtn');
    const copyBtn = document.getElementById('copyBtn');
    const historyBtn = document.getElementById('historyBtn');
    const clearHistoryBtn = document.getElementById('clearHistoryBtn');
    const historySection = document.getElementById('historySection');
    const historyList = document.getElementById('historyList');
    const counterElement = document.getElementById('counter');
    const catButtons = document.querySelectorAll('.cat-btn');

   
    function getWordForm(number) {
        if (number % 10 === 1 && number % 100 !== 11) return 'раз';
        if ([2,3,4].includes(number % 10) && ![12,13,14].includes(number % 100)) return 'раза';
        return 'раз';
    }

    
    function saveToStorage() {
        localStorage.setItem('excuseHistory', JSON.stringify(history));
        localStorage.setItem('excuseCount', usageCount);
    }

    function loadFromStorage() {
        const savedHistory = localStorage.getItem('excuseHistory');
        const savedCount = localStorage.getItem('excuseCount');

        if (savedHistory) {
            history = JSON.parse(savedHistory);
            updateHistoryDisplay();
        }

        if (savedCount) {
            usageCount = parseInt(savedCount);
            updateCounter();
        }
    }


    function updateCounter() {
        const wordForm = getWordForm(usageCount);
        counterElement.textContent = `Использовано: ${usageCount} ${wordForm}`;
    }


    function addToHistory(excuse) {
        const now = new Date();
        const time = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        const date = now.toLocaleDateString('ru-RU');

        const historyItem = {
            text: excuse,
            time: time,
            date: date,
            category: currentCategory
        };

        history.unshift(historyItem);
        if (history.length > 15) {
            history.pop();
        }

        updateHistoryDisplay();
    }


    function updateHistoryDisplay() {
        if (history.length === 0) {
            historyList.innerHTML = '<div class="history-item">История пуста</div>';
            return;
        }

        historyList.innerHTML = '';
        history.forEach(item => {
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `
                <span class="history-time">${item.time}</span>
                <span>${item.text}</span>
            `;
            historyList.appendChild(div);
        });
    }


    function toggleHistory() {
        historyVisible = !historyVisible;
        if (historyVisible) {
            historySection.style.display = 'block';
            historyBtn.textContent = '📜 Скрыть историю';
        } else {
            historySection.style.display = 'none';
            historyBtn.textContent = '📜 Показать историю';
        }
    }


    function clearHistory() {
        if (confirm('Очистить всю историю оправданий?')) {
            history = [];
            usageCount = 0;
            updateHistoryDisplay();
            updateCounter();
            saveToStorage();
        }
    }


    function copyToClipboard() {
        if (!currentExcuse) return;

        navigator.clipboard.writeText(currentExcuse)
            .then(() => {
                const original = copyBtn.innerHTML;
                copyBtn.innerHTML = '✅ Скопировано!';
                copyBtn.style.background = 'linear-gradient(to right, #28a745, #20c997)';

                setTimeout(() => {
                    copyBtn.innerHTML = original;
                    copyBtn.style.background = 'linear-gradient(to right, #00b09b, #96c93d)';
                }, 2000);
            })
            .catch(() => {
                const textArea = document.createElement('textarea');
                textArea.value = currentExcuse;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);

                const original = copyBtn.innerHTML;
                copyBtn.innerHTML = '✅ Скопировано!';
                copyBtn.style.background = 'linear-gradient(to right, #28a745, #20c997)';

                setTimeout(() => {
                    copyBtn.innerHTML = original;
                    copyBtn.style.background = 'linear-gradient(to right, #00b09b, #96c93d)';
                }, 2000);
            });
    }

    async function generateExcuse() {
        if (isLoading) return;

        isLoading = true;
        generateBtn.disabled = true;
        generateBtn.innerHTML = '<span class="loading-spinner"></span> Нейросеть придумывает...';

        excuseDisplay.innerHTML = '<div style="display:flex; align-items:center; justify-content:center; gap:15px;"><div class="loading-spinner" style="width:25px; height:25px;"></div> YandexGPT сочиняет историю...</div>';

        try {
            const subject = 'занятие';
            const excuse = await generateExcuseByAI(subject, currentCategory);
            currentExcuse = excuse;
            excuseDisplay.textContent = currentExcuse;

          
            addToHistory(currentExcuse);

            usageCount++;
            updateCounter();
            saveToStorage();

        } catch (error) {
            console.error('Ошибка:', error);
            excuseDisplay.innerHTML = `❌ Ошибка: ${error.message}<br><br>Попробуйте ещё раз).`;
            currentExcuse = '';
        } finally {
            isLoading = false;
            generateBtn.disabled = false;
            generateBtn.innerHTML = '✨ Сгенерировать оправдание ✨';
        }
    }


    catButtons.forEach(btn => {
        btn.addEventListener('click', function() {
            catButtons.forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            currentCategory = this.dataset.cat;
            generateExcuse();
        });
    });


    generateBtn.addEventListener('click', generateExcuse);
    copyBtn.addEventListener('click', copyToClipboard);
    historyBtn.addEventListener('click', toggleHistory);
    clearHistoryBtn.addEventListener('click', clearHistory);


    document.addEventListener('keydown', (e) => {
        if (e.code === 'Space' && !e.target.matches('button, input, textarea')) {
            e.preventDefault();
            generateExcuse();
        }
        if (e.code === 'KeyC' && (e.ctrlKey || e.metaKey)) {
            e.preventDefault();
            copyToClipboard();
        }
    });


    document.addEventListener('DOMContentLoaded', () => {
        loadFromStorage();
        generateExcuse();
    });
</script>
</body>
</html>
